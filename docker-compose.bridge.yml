services:
  ops:
    network_mode: bridge
    ports:
      - "${WEB_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${SIP_PORT:-5060}:5060/tcp"
      - "${SIP_PORT:-5060}:5060/udp"
      - "${API_PORT:-8088}:8088"
      - "${WS_PORT:-50010}:50010"
      - "${MULTICAST_GATEWAY_PORT:-8710}:8710/udp"
    depends_on:
      db:
        condition: service_healthy
